version: '3.8'

services:
  frontend:
    build: ./frontend
    environment:
      - PORT=3001

  backend:
    build: ./backend
    environment:
      - PORT=3000
      - MONGODB_URI=mongodb://mongo:27017/consultant-app
    depends_on:
      - mongo

  mongo:
    image: mongo:latest

  nginx:
    image: nginx:latest
    ports:
      - "8081:8080"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - frontend
      - backend
